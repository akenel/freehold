<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>403 — Freehold</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="wrap">
    {% include "_topbar.html" %}

    <main class="card">
      <h1>403 — not your gate.</h1>
      <p class="lede">You're signed in, but the admin console needs the <b>admin</b> role. RBAC is doing exactly its job.</p>
      <div class="cell">
        <div class="k">Your roles</div>
        <div class="v"><div class="chips">
          {% for r in user.roles %}<span class="chip {{ 'admin' if r == 'admin' else '' }}">{{ r }}</span>{% endfor %}
        </div></div>
      </div>
      <div class="row" style="margin-top:18px">
        <a class="btn ghost" href="/dashboard">← Back to dashboard</a>
      </div>
    </main>
  </div>
</body>
</html>
