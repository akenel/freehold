# Freehold — PRODUCTION overlay. Real domain + real HTTPS (Let's Encrypt via DuckDNS).
#
#   1) Register a free subdomain at duckdns.org and point it at THIS server's IP.
#   2) Open ports 80 + 443.
#   3) Add the domain to the realms:   python3 ops/set-domain.py freeholder.duckdns.org
#   4) Launch:
#        SITE_DOMAIN=freeholder.duckdns.org CADDYFILE=./Caddyfile.prod \
#          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# (Uses the SAME app/keycloak/postgres/minio as dev — only the front door, hostname,
#  and public URLs change. That's the whole point: one stack, dev to prod.)
services:
  caddy:
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
    ports:
      # Defaults to the real 80/443. On a box where those are taken (e.g. an
      # existing Traefik), set CADDY_HTTP_PORT/CADDY_HTTPS_PORT to high ports and
      # have your ROUTER forward public 80->that http port, 443->that https port.
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"

  keycloak:
    environment:
      KC_HOSTNAME: https://${SITE_DOMAIN}

  app:
    environment:
      APP_BASE_URL: https://${SITE_DOMAIN}
      KC_PUBLIC_URL: https://${SITE_DOMAIN}

  # Optional: keep the DuckDNS record pointed at this box (only needed if your
  # server's IP is dynamic — a home box or Pi). Static VPS? Set the IP once on
  # duckdns.org and delete this service. DUCKDNS_TOKEN lives in .env (gitignored)
  # — NEVER commit it.
  duckdns:
    image: curlimages/curl:8.11.1
    restart: unless-stopped
    environment:
      DUCKDNS_DOMAIN: ${DUCKDNS_DOMAIN:-freeholder}
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN}
    entrypoint: ["/bin/sh", "-c",
      "while true; do curl -fsS \"https://www.duckdns.org/update?domains=$${DUCKDNS_DOMAIN}&token=$${DUCKDNS_TOKEN}&ip=\" && echo \" duckdns updated\"; sleep 300; done"]
    networks: [freehold]
