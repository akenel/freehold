# Freehold — PRODUCTION overlay. Real domains + real HTTPS (Let's Encrypt).
#
# Shared-auth model: the app is served at SITE_DOMAIN (this env's subdomain) and
# ONE shared Keycloak is served at AUTH_DOMAIN, holding all three realms. Both
# come from .env (see deploy/<env>.env.example).
#
#   cp deploy/sandbox.env.example .env      # (or staging / production)
#   # fill in the secrets, then:
#   CADDYFILE=./Caddyfile.prod \
#     docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# (Same app/keycloak/postgres/minio as dev — only the front door, hostnames, and
#  public URLs change. One stack, dev to prod.)
services:
  caddy:
    # Custom build = stock Caddy + caddy-dns/porkbun, so it can do DNS-01 (wildcard
    # certs). Overrides the base image. First deploy builds it; `docker compose
    # build caddy` to rebuild after a Caddy bump.
    build: ./caddy
    image: freehold-caddy:prd
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}      # this box's app host, e.g. sandbox.wolfhold.app
      AUTH_DOMAIN: ${AUTH_DOMAIN}      # the shared Keycloak host, auth.wolfhold.app
      # --- Wildcard cert via Porkbun DNS-01 (see Caddyfile.prod + caddy/Dockerfile) ---
      BASE_DOMAIN: ${BASE_DOMAIN:-wolfhold.app}     # registrable domain for *.<domain>
      PORKBUN_API_KEY: ${PORKBUN_API_KEY:-}         # from Porkbun (API access ON per-domain)
      PORKBUN_SECRET_KEY: ${PORKBUN_SECRET_KEY:-}
      # Default to the Caddyfile's inert loopback addresses (NOT empty): Caddy
      # treats a set-but-empty {$VAR} as an empty key and crashes the whole
      # config ("server block without any key must be first"). An unset var uses
      # the Caddyfile default, but compose passing "" defeats that — so default
      # here too. Must match the {$VAR:...} fallbacks in Caddyfile.prod.
      APEX_DOMAIN: ${APEX_DOMAIN:-http://localhost:2020}   # prod: wolfhold.app -> 301 www (else inert)
      DOCS_DOMAIN: ${DOCS_DOMAIN:-http://localhost:2023}   # optional: docs.wolfhold.app -> ./site (else inert)
    volumes:
      # Pre-built public docs (make docs-build). Read-only; empty until built.
      - ./site:/srv/docs:ro
    ports:
      # Defaults to the real 80/443. On a box where those are taken (e.g. an
      # existing Traefik), set CADDY_HTTP_PORT/CADDY_HTTPS_PORT to high ports and
      # have your ROUTER forward public 80->that http port, 443->that https port.
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"

  keycloak:
    environment:
      # The shared auth host — makes the token ISSUER deterministic for every realm.
      KC_HOSTNAME: https://${AUTH_DOMAIN}

  app:
    environment:
      APP_BASE_URL: https://${SITE_DOMAIN}      # this env's own front door
      KC_PUBLIC_URL: https://${AUTH_DOMAIN}     # browser logs in at the shared auth host
