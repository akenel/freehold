# =============================================================
# Freehold — Phase 1: the skeleton
# Four honest pieces, one command: `docker compose up -d`
#   postgres  — your data
#   keycloak  — login + roles; ONE shared instance, 3 realms (kc-sbx/kc-stg/kc-prd)
#   app       — a FastAPI hello that proves the DB + env wiring
#   caddy     — one front door; /realms/* -> keycloak, everything else -> app
#
# Config lives in .env  (copy .env.example -> .env first, or run `make up`).
# Nothing here is a stripped-down toy — these are the real images, wired right.
# =============================================================
name: freehold

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_APP_DB}
      POSTGRES_KC_DB: ${POSTGRES_KC_DB}      # second DB, created by the init script
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_APP_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [freehold]

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]   # dev mode; imports the 3 realms on first boot
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_KC_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      # Fix the public base URL so the token issuer is deterministic behind Caddy.
      # Browser reaches KC at localhost:8080 (via Caddy); the app talks to it
      # internally at keycloak:8080 — but the ISSUER is always localhost:8080.
      KC_HOSTNAME: https://localhost:8443
      KC_PROXY_HEADERS: xforwarded
      # Files vault — keeps secrets (SMTP password etc.) OUT of the realm JSON.
      # Realms reference ${vault.smtppass}; the value lives in a gitignored file
      # under keycloak/vault/, written from .env by `python3 ops/set-smtp.py`.
      KC_VAULT: file
      KC_VAULT_DIR: /opt/keycloak/data/vault
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import:ro
      - ./keycloak/themes:/opt/keycloak/themes:ro    # custom login theme (adds Hindi)
      - ./keycloak/vault:/opt/keycloak/data/vault:ro  # secret files (gitignored)
    ports:
      - "127.0.0.1:8081:8080"    # direct KC (admin console + realm probe) — dev only
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 45s
    networks: [freehold]

  minio:
    image: minio/minio:latest      # pin to a RELEASE.* tag in production
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    ports:
      - "127.0.0.1:9001:9001"      # MinIO web console (dev)
    networks: [freehold]

  robot-sim:
    build: ./robot-sim          # the hardware bridge — swap for a real Pi bridge later
    restart: unless-stopped
    ports:
      - "127.0.0.1:9100:9100"   # peek at the sim directly (dev)
    networks: [freehold]

  app:
    build: ./app
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_APP_DB}
    ports:
      - "127.0.0.1:8000:8000"    # direct app — handy for debugging
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks: [freehold]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    volumes:
      - ${CADDYFILE:-./Caddyfile}:/etc/caddy/Caddyfile:ro    # prod overlay sets ./Caddyfile.prod
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "127.0.0.1:8443:443"     # THE front door -> https://localhost:8443
      # (dev uses 8443 so it never clashes with anything on 443; prod uses your
      #  real domain on 443 via Caddy's automatic Let's Encrypt.)
    depends_on:
      - app
      - keycloak
    networks: [freehold]

volumes:
  pgdata:
  miniodata:
  caddy_data:
  caddy_config:

networks:
  freehold:
